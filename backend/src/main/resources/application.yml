server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cargo-pickup-system
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cargo_pickup}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.airport.cargo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: 机场货站提货预约系统 API
    description: 机场货站提货预约系统接口文档
    version: 1.0.0
    concat: developer@airport.com

app:
  security:
    token-expire-hours: 24
  booking:
    window-duration-minutes: 30
    max-queue-size: 50
    auto-cancel-minutes: 60
    customs-draw-probability: 0.15
  queue:
    max-normal-queue-size: 50
    max-cold-chain-queue-size: 20
    max-customs-queue-size: 30
    average-minutes-per-pickup: 15
    cold-chain-priority-bonus: 10
    near-arrival-priority-bonus: 5
    partial-delivery-priority-bonus: 3
    partial-hold-priority-bonus: 2
